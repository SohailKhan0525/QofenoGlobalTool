name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: |
          echo "Rebuilding native modules to fix optional native bindings"
          npm rebuild || true

      - name: Build frontend
        env:
          VITE_APPWRITE_ENDPOINT: ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID: ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DATABASE_ID: ${{ secrets.VITE_APPWRITE_DATABASE_ID }}
          VITE_APPWRITE_FUNCTION_JSON_FORMATTER_ID: ${{ secrets.VITE_APPWRITE_FUNCTION_JSON_FORMATTER_ID }}
          VITE_APPWRITE_FUNCTION_WORD_COUNTER_ID: ${{ secrets.VITE_APPWRITE_FUNCTION_WORD_COUNTER_ID }}
          VITE_APPWRITE_FUNCTION_BASE64_ENCODER_ID: ${{ secrets.VITE_APPWRITE_FUNCTION_BASE64_ENCODER_ID }}
          VITE_APPWRITE_FUNCTION_TEXT_CASE_CONVERTER_ID: ${{ secrets.VITE_APPWRITE_FUNCTION_TEXT_CASE_CONVERTER_ID }}
          VITE_APPWRITE_FUNCTION_TRACK_EVENT_ID: ${{ secrets.VITE_APPWRITE_FUNCTION_TRACK_EVENT_ID }}
          VITE_APPWRITE_FUNCTION_AUTH_WEBHOOK_ID: ${{ secrets.VITE_APPWRITE_FUNCTION_AUTH_WEBHOOK_ID }}
          VITE_APPWRITE_FUNCTION_PAYMENT_WEBHOOK_ID: ${{ secrets.VITE_APPWRITE_FUNCTION_PAYMENT_WEBHOOK_ID }}
          VITE_APPWRITE_FUNCTION_CREATE_DOWNLOAD_LINK_ID: ${{ secrets.VITE_APPWRITE_FUNCTION_CREATE_DOWNLOAD_LINK_ID }}
        run: npm run build

      - name: Deploy to Cloudflare Pages (wrangler)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx -y wrangler@3 pages deploy dist --project-name ${{ secrets.CLOUDFLARE_PAGES_PROJECT }} --branch main
